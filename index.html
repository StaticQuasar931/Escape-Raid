<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Escape Raid</title>
  <meta name="description" content="Escape Raid WebGL build">
  <style>
    :root {
      color-scheme: dark;
      --bg-top: #132033;
      --bg-bottom: #06090f;
      --panel: rgba(10, 16, 28, 0.88);
      --panel-border: rgba(152, 201, 255, 0.18);
      --text: #f5f7fb;
      --muted: #b9c6da;
      --progress-bg: rgba(255, 255, 255, 0.14);
      --progress-fill-a: #33e6cf;
      --progress-fill-b: #ffd642;
      --error: #ff6f7d;
      --warning: #ffd76a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(70, 122, 193, 0.38), transparent 40%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      color: var(--text);
      font-family: Verdana, Geneva, Tahoma, sans-serif;
    }

    body {
      position: relative;
    }

    #unity-container {
      position: absolute;
      inset: 0;
      background: #000;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }

    #unity-loading-bar {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .loading-backdrop {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(6, 9, 15, 0.18), rgba(6, 9, 15, 0.78)),
        url("loading.png") center / cover no-repeat;
      filter: blur(14px);
      transform: scale(1.08);
      opacity: 0.7;
    }

    .loading-panel {
      position: relative;
      z-index: 1;
      width: min(92vw, 420px);
      padding: 20px;
      border-radius: 22px;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      box-shadow: 0 26px 70px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      text-align: center;
    }

    .loading-thumb {
      width: min(100%, 240px);
      border-radius: 18px;
      display: block;
      margin: 0 auto 18px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.34);
    }

    .loading-logo {
      width: min(100%, 200px);
      display: block;
      margin: 0 auto 14px;
    }

    .loading-title {
      font-size: clamp(28px, 4vw, 36px);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .loading-subtitle {
      min-height: 1.4em;
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .loading-version {
      margin-top: 6px;
      color: rgba(255, 255, 255, 0.45);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    #unity-progress-bar-empty {
      width: 100%;
      height: 14px;
      margin-top: 18px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--progress-bg);
    }

    #unity-progress-bar-full {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--progress-fill-a), var(--progress-fill-b));
      transition: width 140ms linear;
    }

    .helper-copy {
      margin-top: 14px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 12px;
      line-height: 1.5;
    }

    .unity-banner {
      position: absolute;
      left: 16px;
      right: 16px;
      z-index: 3;
      padding: 12px 14px;
      border-radius: 14px;
      text-align: center;
      font-size: 14px;
      line-height: 1.4;
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(6px);
    }

    .unity-banner.warning {
      top: 16px;
      color: #2a2000;
      background: rgba(255, 215, 106, 0.92);
    }

    .unity-banner.error {
      bottom: 16px;
      color: #fff5f6;
      background: rgba(166, 26, 44, 0.94);
    }

    .unity-banner.error.fatal {
      max-width: 760px;
      left: 50%;
      right: auto;
      bottom: 24px;
      width: calc(100% - 32px);
      transform: translateX(-50%);
    }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    <div id="unity-loading-bar">
      <div class="loading-backdrop"></div>
      <div class="loading-panel">
        <img class="loading-thumb" src="loading.png" alt="Escape Raid loading art">
        <img class="loading-logo" src="logo.png" alt="Escape Raid logo">
        <div class="loading-title">Escape Raid</div>
        <div class="loading-subtitle" id="loading-text">Preparing Unity build...</div>
        <div class="loading-version">Build 25091906</div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
        <div class="helper-copy">Click once after load if audio or fullscreen needs a nudge.</div>
      </div>
    </div>
    <div id="unity-warning" hidden></div>
    <div id="unity-error" hidden></div>
  </div>

  <script>
    (function() {
      const productVersion = "25091906";
      const localBuildUrl = "Build";
      const remoteBuildUrl = "https://games.azgame.io/game/escape-raid/25091906/Build";
      const localDataUrl = localBuildUrl + "/escape-raid-v" + productVersion + ".data.unityweb";
      const remoteDataUrl = remoteBuildUrl + "/escape-raid-v" + productVersion + ".data.unityweb";
      const loaderUrl = localBuildUrl + "/escape-raid-v" + productVersion + ".loader.js";
      const gamesdkUrlPattern = /api\.cdnwave\.com\/sdkdom\/gamesdk/i;
      const signedDomainToken = "eyJzaWduZWQiOiJJaHQ2XC9qdTRUWk15dTljNUhNbWNmekM2QWFmdXFIbGlqOFNcL1ZNNGJxOFVERXZ2czBwc3gwZUZQNEdWSkVWNmVFU2FMaGV1UERNMnEwOVVhUFRLODFJbVpVYnBpTndMXC9wNENcL2R2RWRkanlQK1RyUFFqazNLOUxOM0ZNRDluN0hSXC9ZblAxRmJYTkxoOG0zY3ZLT1JjaWdyXC9Na1JJQnV4SndQaWlvTlFMTVVPbkIzUmZUUkV1czBXbThJK3l4WEdzWUttSVhrT1lGT2hMXC8xb29NNG1hYWswMHZCaFwvZ2J1T09DRDBmZE82K2k3WVFuQUpvQUlBVTNtVXZUc0g4bWN3XC9qUmtTc3E5a2hWdktWVStnem4rZndveVpKWDFWTE00alwvUzZWdVF5SGJoSWEzM0d6U2hjUDZYQXpUUTBIOWpsc2pzNU83aEx4alVkUlcrSDFsZW9RPT0iLCJhcCI6InllcyIsImhuIjoiZ2FtZS5hemdhbWUuaW8iLCJkb21haW4iOiJhemdhbWUuaW8iLCJzIjoieWVzIiwic3R5cGUiOjJ9";

      function encodeBase64(value) {
        return btoa(unescape(encodeURIComponent(value)));
      }

      function decodeBase64Json(value) {
        try {
          return JSON.parse(decodeURIComponent(escape(atob(value))));
        } catch (error) {
          return null;
        }
      }

      function isGamesdkUrl(url) {
        return typeof url === "string" && gamesdkUrlPattern.test(url);
      }

      function makeGamesdkResponseBody() {
        return JSON.stringify(unlockedGameInfoResponse);
      }

      function createGamesdkResponse() {
        return new Response(makeGamesdkResponseBody(), {
          status: 200,
          headers: {
            "Content-Type": "application/json"
          }
        });
      }

      const signedDomainData = decodeBase64Json(signedDomainToken) || {};
      const verifiedSignature = signedDomainData.signed || "";
      const allowedHosts = Array.from(new Set([
        location.hostname,
        "localhost",
        "127.0.0.1",
        "game.azgame.io",
        "games.azgame.io",
        "azgame.io"
      ]));

      const unityGameInfoObject = {
        allowPlay: true,
        allow_play: true,
        allow: true,
        locked: false,
        block: false,
        blocked: false,
        hosted: true,
        sdkType: "gm",
        sdk_type: "gm",
        gameId: "escape-raid",
        gameid: "escape-raid",
        gameName: "Escape Raid",
        gdGameKey: "escape-raid-az",
        gd_game_key: "escape-raid-az",
        moreGamesUrl: "",
        more_games_url: "",
        promotion: [],
        promotions: [],
        veryfiedDomainData: {
          whiteListDomain: allowedHosts,
          veryfiedSignature: verifiedSignature,
          domain: location.hostname,
          host: location.hostname
        },
        whiteListDomain: allowedHosts,
        veryfiedSignature: verifiedSignature,
        domain: location.hostname,
        host: location.hostname
      };

      const unityAdInfoObject = {
        enable: "no",
        adsEnabled: false,
        rewardedEnabled: false,
        interstitialEnabled: false,
        bannerEnabled: false,
        adTag: "",
        placements: []
      };

      const unityGameInfoParam = encodeBase64(JSON.stringify(unityGameInfoObject));
      const unityAdInfoParam = encodeBase64(JSON.stringify(unityAdInfoObject));

      const unlockedGameInfoResponse = {
        success: true,
        status: "success",
        message: "ok",
        sdk_type: "gm",
        sdkName: "gm",
        sdkVersion: "local-fix",
        allow_play: true,
        allow: true,
        allowPlay: true,
        block: false,
        blocked: false,
        locked: false,
        hosted: true,
        game: "escape-raid",
        gameid: "escape-raid",
        gameId: "escape-raid",
        gameName: "Escape Raid",
        gd_game_key: "escape-raid-az",
        more_games_url: "",
        hosts: allowedHosts,
        allowedHost: location.hostname,
        allowedHosts: allowedHosts,
        sitelockVersion: 2,
        allowLocalHost: true,
        allowCollectionPI: false,
        version: productVersion,
        title: "Escape Raid",
        messageStr: "ok",
        errorReason: "",
        regisinfo: {
          allow_play: "yes",
          unlock_timer: "0",
          name: "Escape Raid",
          description: "",
          image: "loading.png",
          redirect_url: "",
          signed: signedDomainToken
        },
        adsinfo: {
          enable: "no",
          ads_debug: "no",
          ads_code: "",
          time_show_inter: 0,
          time_show_reward: 0,
          sdk_type: "gm",
          enable_preroll: "no",
          enable_reward: "no",
          enable_interstitial: "no"
        },
        gameinfo: {
          moregames_url: "",
          enable_moregame: "no",
          promotion: {
            enable: "no",
            call_to_action: "no",
            promotion_list: []
          },
          redirect_url: ""
        },
        gameInfoParam: unityGameInfoParam,
        adParam: unityAdInfoParam,
        data: unityGameInfoParam,
        game_info: unityGameInfoParam,
        ad_info: unityAdInfoParam,
        config: unityGameInfoObject,
        gameInfo: unityGameInfoObject,
        result: {
          success: true,
          data: unityGameInfoParam,
          adData: unityAdInfoParam
        }
      };

      try {
        localStorage.setItem("gmsdksigndomain", signedDomainToken);
        localStorage.setItem("gm_game_info", makeGamesdkResponseBody());
        localStorage.setItem("gameInfoResponse", makeGamesdkResponseBody());
        localStorage.setItem("gm_game_info_param", unityGameInfoParam);
        localStorage.setItem("gm_ad_info_param", unityAdInfoParam);
      } catch (error) {}

      window.GMSOFT_SDKTYPE = "gm";
      window.sdkType = "gm";
      window.GMSOFT_SIGNED = signedDomainToken;
      window.GMSOFT_GAME_INFO = {
        sdktype: "gm",
        more_games_url: "",
        promotion: []
      };
      window.GMSOFT_ADS_INFO = {
        enable: "no",
        sdk_type: "gm",
        time_show_inter: 0,
        time_show_reward: 0,
        reward: "no",
        enable_reward: "no",
        enable_interstitial: "no",
        enable_preroll: "no"
      };

      function firebaseLogEvent() {}
      function firebaseLogEventParameter() {}
      function firebaseSetUserProperties() {}
      function gmEvent() {}
      function gmStartGame(callbackFunction) {
        if (typeof callbackFunction === "function") {
          callbackFunction();
        }
      }
      function gmStartAds(callbackFunction) {
        if (typeof callbackFunction === "function") {
          callbackFunction();
        }
      }
      function SetSDKType() {}

      window.firebaseLogEvent = window.firebaseLogEvent || firebaseLogEvent;
      window.firebaseLogEventParameter = window.firebaseLogEventParameter || firebaseLogEventParameter;
      window.firebaseSetUserProperties = window.firebaseSetUserProperties || firebaseSetUserProperties;
      window.gmEvent = window.gmEvent || gmEvent;
      window.gmStartGame = window.gmStartGame || gmStartGame;
      window.gmStartAds = window.gmStartAds || gmStartAds;
      window.SetSDKType = window.SetSDKType || SetSDKType;
      window.GMGameSDK = window.GMGameSDK || {
        init: function() {
          return {
            setVersion: function() {
              return this;
            }
          };
        },
        trackEvent: function() {},
        trackEventParams: function() {}
      };
      window.GMSDK = window.GMSDK || {};
      window.GMSDK.SetSDKType = window.GMSDK.SetSDKType || SetSDKType;
      window.GMSDK.SetGameInfoParam = window.GMSDK.SetGameInfoParam || function() {
        return unityGameInfoParam;
      };
      window.GMAdvertisementManager = window.GMAdvertisementManager || {};
      window.GMAdvertisementManager.SetAdParam = window.GMAdvertisementManager.SetAdParam || function() {
        return unityAdInfoParam;
      };
      window.GMAnalytics = window.GMAnalytics || {
        LogEvent: function() {}
      };

      const nativeFetch = window.fetch ? window.fetch.bind(window) : null;
      if (nativeFetch) {
        window.fetch = function(resource, init) {
          const url = typeof resource === "string" ? resource : resource && resource.url;
          if (isGamesdkUrl(url)) {
            return Promise.resolve(createGamesdkResponse());
          }
          return nativeFetch(resource, init);
        };
      }

      (function() {
        const nativeOpen = XMLHttpRequest.prototype.open;
        const nativeSend = XMLHttpRequest.prototype.send;
        const nativeSetRequestHeader = XMLHttpRequest.prototype.setRequestHeader;
        const nativeGetResponseHeader = XMLHttpRequest.prototype.getResponseHeader;
        const nativeGetAllResponseHeaders = XMLHttpRequest.prototype.getAllResponseHeaders;

        XMLHttpRequest.prototype.open = function(method, url) {
          this.__codexGamesdkUrl = typeof url === "string" ? url : "";
          this.__codexGamesdkIntercept = isGamesdkUrl(this.__codexGamesdkUrl);
          if (!this.__codexGamesdkIntercept) {
            return nativeOpen.apply(this, arguments);
          }
          this.readyState = 1;
          if (typeof this.onreadystatechange === "function") {
            this.onreadystatechange();
          }
        };

        XMLHttpRequest.prototype.setRequestHeader = function(name, value) {
          if (this.__codexGamesdkIntercept) {
            return;
          }
          return nativeSetRequestHeader.call(this, name, value);
        };

        XMLHttpRequest.prototype.send = function() {
          if (!this.__codexGamesdkIntercept) {
            return nativeSend.apply(this, arguments);
          }

          const payload = makeGamesdkResponseBody();
          Object.defineProperty(this, "readyState", { configurable: true, value: 4 });
          Object.defineProperty(this, "status", { configurable: true, value: 200 });
          Object.defineProperty(this, "statusText", { configurable: true, value: "OK" });
          Object.defineProperty(this, "responseText", { configurable: true, value: payload });
          Object.defineProperty(this, "response", { configurable: true, value: payload });

          if (typeof this.onreadystatechange === "function") {
            this.onreadystatechange();
          }
          if (typeof this.onload === "function") {
            this.onload();
          }
          if (typeof this.onloadend === "function") {
            this.onloadend();
          }
        };

        XMLHttpRequest.prototype.getResponseHeader = function(name) {
          if (this.__codexGamesdkIntercept) {
            return name && name.toLowerCase() === "content-type" ? "application/json" : null;
          }
          return nativeGetResponseHeader.call(this, name);
        };

        XMLHttpRequest.prototype.getAllResponseHeaders = function() {
          if (this.__codexGamesdkIntercept) {
            return "content-type: application/json\r\n";
          }
          return nativeGetAllResponseHeaders.call(this);
        };
      })();

      const config = {
        dataUrl: remoteDataUrl,
        frameworkUrl: localBuildUrl + "/escape-raid-v" + productVersion + ".framework.js.unityweb",
        codeUrl: localBuildUrl + "/escape-raid-v" + productVersion + ".wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Escape Raid",
        productName: "Escape Raid",
        productVersion: productVersion,
        autoSyncPersistentDataPath: true,
        showBanner: function(message, type) {
          const warning = document.getElementById("unity-warning");
          warning.hidden = false;
          warning.textContent = message;
          warning.className = type === "error" ? "unity-banner error" : "unity-banner warning";
          if (type !== "error") {
            setTimeout(function() {
              warning.hidden = true;
              warning.textContent = "";
            }, 5000);
          }
        }
      };

      const localRequiredFiles = [
        loaderUrl,
        config.frameworkUrl,
        config.codeUrl,
        "loading.png",
        "logo.png",
        "StreamingAssets/UnityServicesProjectConfiguration.json"
      ];

      const container = document.getElementById("unity-container");
      const canvas = document.getElementById("unity-canvas");
      const loadingBar = document.getElementById("unity-loading-bar");
      const progressBarFull = document.getElementById("unity-progress-bar-full");
      const loadingText = document.getElementById("loading-text");
      const errorPanel = document.getElementById("unity-error");

      function setFatalError(message) {
        errorPanel.hidden = false;
        errorPanel.textContent = message;
        errorPanel.className = "unity-banner error fatal";
      }

      async function fileExists(path) {
        try {
          const response = await fetch(path, { method: "HEAD" });
          return response.ok;
        } catch (error) {
          return false;
        }
      }

      async function configureDataUrl() {
        if (await fileExists(localDataUrl)) {
          config.dataUrl = localDataUrl;
          return "local";
        }
        config.dataUrl = remoteDataUrl;
        return "remote";
      }

      async function verifyLocalFiles() {
        const checks = await Promise.all(localRequiredFiles.map(async function(path) {
          return { path: path, exists: await fileExists(path) };
        }));
        return checks.filter(function(entry) {
          return !entry.exists;
        }).map(function(entry) {
          return entry.path;
        });
      }

      function removeLockOverlay() {
        const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_ELEMENT);
        let node;
        while ((node = walker.nextNode())) {
          const text = (node.textContent || "").trim();
          if (!text) {
            continue;
          }
          if (text === "Escape Raid is locked." || text === "Escape Raid is locked") {
            node.style.display = "none";
            node.setAttribute("aria-hidden", "true");
          }
        }
      }

      function observeLockOverlay() {
        removeLockOverlay();
        const observer = new MutationObserver(function() {
          removeLockOverlay();
        });
        observer.observe(document.body, {
          childList: true,
          subtree: true,
          characterData: true
        });
      }

      function requestFullscreen(event) {
        if (document.fullscreenElement) {
          return;
        }
        if (event && event.type === "pointerdown" && event.button !== 0) {
          return;
        }
        if (container.requestFullscreen) {
          container.requestFullscreen().catch(function() {});
        }
      }

      function unlockAudio() {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) {
          return;
        }
        try {
          const context = window.__escapeRaidAudioContext || new AudioContextClass();
          window.__escapeRaidAudioContext = context;
          if (context.state === "suspended") {
            context.resume().catch(function() {});
          }
        } catch (error) {}
      }

      function installInteractionHandlers() {
        const activate = function(event) {
          unlockAudio();
          requestFullscreen(event);
        };
        window.addEventListener("pointerdown", activate, { passive: true });
        window.addEventListener("keydown", activate, { passive: true });
        window.addEventListener("touchstart", activate, { passive: true });
      }

      function feedUnitySdkParameters() {
        const instance = window.unityInstance;
        if (!instance || typeof instance.SendMessage !== "function") {
          return false;
        }

        const calls = [
          ["GMSDK", "SetGameInfoParam", unityGameInfoParam],
          ["GMAdvertisementManager", "SetAdParam", unityAdInfoParam]
        ];

        let sent = false;
        calls.forEach(function(entry) {
          try {
            instance.SendMessage(entry[0], entry[1], entry[2]);
            sent = true;
          } catch (error) {}
        });
        return sent;
      }

      function scheduleUnitySdkFeed() {
        [0, 150, 400, 900, 1600, 2600, 4000].forEach(function(delay) {
          setTimeout(function() {
            feedUnitySdkParameters();
          }, delay);
        });
      }

      async function bootGame() {
        loadingText.textContent = "Checking local files...";
        const missing = await verifyLocalFiles();
        if (missing.length) {
          setFatalError("Missing required local file" + (missing.length > 1 ? "s" : "") + ": " + missing.join(", "));
          return;
        }

        const dataMode = await configureDataUrl();
        loadingText.textContent = dataMode === "local"
          ? "Loading local Unity data..."
          : "Loading Unity data from the original host...";

        const script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = function() {
          createUnityInstance(canvas, config, function(progress) {
            const percent = Math.max(0, Math.min(100, Math.round(progress * 100)));
            progressBarFull.style.width = percent + "%";
            loadingText.textContent = percent >= 100
              ? "Starting game..."
              : "Loading... " + percent + "%";
          }).then(function(unityInstance) {
            window.unityInstance = unityInstance;
            loadingBar.style.display = "none";
            canvas.focus();
            installInteractionHandlers();
            scheduleUnitySdkFeed();
          }).catch(function(message) {
            setFatalError(typeof message === "string" ? message : "Unity failed to start. Check the browser console for details.");
          });
        };
        script.onerror = function() {
          setFatalError("The Unity loader script could not be loaded.");
        };
        document.body.appendChild(script);
      }

      if (location.protocol === "file:") {
        setFatalError("This build must be served from a local web server. Opening index.html directly with file:// will not work for Unity WebGL.");
      } else {
        observeLockOverlay();
        bootGame();
      }
    })();
  </script>
</body>
</html>
