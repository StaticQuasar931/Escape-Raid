<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Escape Raid</title>
  <meta name="description" content="Escape Raid WebGL build">
  <link rel="icon" href="logo.png">
  <style>
    :root {
      color-scheme: dark;
      --bg-top: #132033;
      --bg-bottom: #06090f;
      --panel: rgba(10, 16, 28, 0.88);
      --panel-border: rgba(152, 201, 255, 0.18);
      --text: #f5f7fb;
      --muted: #b9c6da;
      --progress-bg: rgba(255, 255, 255, 0.14);
      --progress-fill-a: #33e6cf;
      --progress-fill-b: #ffd642;
      --error: #ff6f7d;
      --warning: #ffd76a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(70, 122, 193, 0.38), transparent 40%),
        linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
      color: var(--text);
      font-family: Verdana, Geneva, Tahoma, sans-serif;
    }

    body {
      position: relative;
    }

    #unity-container {
      position: absolute;
      inset: 0;
      background: #000;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }

    #unity-loading-bar {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .loading-backdrop {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(rgba(6, 9, 15, 0.18), rgba(6, 9, 15, 0.78)),
        url("loading.png") center / cover no-repeat;
      filter: blur(14px);
      transform: scale(1.08);
      opacity: 0.7;
    }

    .loading-panel {
      position: relative;
      z-index: 1;
      width: min(92vw, 420px);
      padding: 20px;
      border-radius: 22px;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      box-shadow: 0 26px 70px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(12px);
      text-align: center;
    }

    .loading-thumb {
      width: min(100%, 240px);
      border-radius: 18px;
      display: block;
      margin: 0 auto 18px;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.34);
    }

    .loading-logo {
      width: min(100%, 200px);
      display: block;
      margin: 0 auto 14px;
    }

    .loading-title {
      font-size: clamp(28px, 4vw, 36px);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .loading-subtitle {
      min-height: 1.4em;
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    .loading-version {
      margin-top: 6px;
      color: rgba(255, 255, 255, 0.45);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    #unity-progress-bar-empty {
      width: 100%;
      height: 14px;
      margin-top: 18px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--progress-bg);
    }

    #unity-progress-bar-full {
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--progress-fill-a), var(--progress-fill-b));
      transition: width 140ms linear;
    }

    .helper-copy {
      margin-top: 14px;
      color: rgba(255, 255, 255, 0.78);
      font-size: 12px;
      line-height: 1.5;
    }

    .unity-banner {
      position: absolute;
      left: 16px;
      right: 16px;
      z-index: 3;
      padding: 12px 14px;
      border-radius: 14px;
      text-align: center;
      font-size: 14px;
      line-height: 1.4;
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(6px);
    }

    .unity-banner.warning {
      top: 16px;
      color: #2a2000;
      background: rgba(255, 215, 106, 0.92);
    }

    .unity-banner.error {
      bottom: 16px;
      color: #fff5f6;
      background: rgba(166, 26, 44, 0.94);
    }

    .unity-banner.error.fatal {
      max-width: 760px;
      left: 50%;
      right: auto;
      bottom: 24px;
      width: calc(100% - 32px);
      transform: translateX(-50%);
    }

    .codex-hidden-lock-overlay {
      display: none !important;
      visibility: hidden !important;
      pointer-events: none !important;
      opacity: 0 !important;
    }

    .codex-hidden-lock-text {
      color: transparent !important;
      text-shadow: none !important;
      background: transparent !important;
      border-color: transparent !important;
    }

    .codex-disable-pointer {
      pointer-events: none !important;
    }
  </style>
</head>

      const localRequiredFiles = [

      function setFatalError(message) {
        errorPanel.hidden = false;
        errorPanel.textContent = message;
        errorPanel.className = "unity-banner error fatal";

      async function fileExists(path) {
        try {
          const response = await fetch(path, { method: "HEAD" });
          return response.ok;
        } catch (error) {
          return false;
        }
      }

      async function configureDataUrl() {
        if (await fileExists(localDataUrl)) {
          config.dataUrl = localDataUrl;
          return "local";
        }
        config.dataUrl = remoteDataUrl;
        return "remote";
      }

      async function verifyLocalFiles() {
        const checks = await Promise.all(localRequiredFiles.map(async function(path) {
          return { path: path, exists: await fileExists(path) };
        }));
        return checks.filter(function(entry) {
          return !entry.exists;
        }).map(function(entry) {
          return entry.path;
        });
      }

      function hideOverlayNode(node) {
        if (!(node instanceof HTMLElement)) {
          return;
        }
        node.classList.add("codex-hidden-lock-overlay");
        node.setAttribute("aria-hidden", "true");
      }

      function hideLockTextNode(node) {
        if (!(node instanceof HTMLElement)) {
          return;
        }
        node.classList.add("codex-hidden-lock-text");
        node.setAttribute("aria-hidden", "true");
      }

      function debugLockNode() {}

      function looksLikeLockCopy(text) {
        const value = (text || "").replace(/\s+/g, " ").trim().toLowerCase();
        if (!value) {
          return false;
        }
        return value.includes("locked") ||
          value.includes("unlock") ||
          value.includes("not available on this site") ||
          value.includes("play on") ||
          value.includes("open on") ||
          value.includes("continue on") ||
          value.includes("this game is not available");
      }

      function isLargeOverlayElement(node) {
        if (!(node instanceof HTMLElement)) {
          return false;
        }
        const style = window.getComputedStyle(node);
        const rect = node.getBoundingClientRect();
        const wideEnough = rect.width >= window.innerWidth * 0.35;
        const tallEnough = rect.height >= window.innerHeight * 0.18;
        const positioned = style.position === "fixed" || style.position === "absolute" || style.position === "sticky";
        const elevated = Number(style.zIndex || "0") >= 10 || style.position === "fixed";
        return wideEnough && tallEnough && positioned && elevated;
      }

      function removeInjectedIframes() {
        const frames = document.querySelectorAll("iframe");
        frames.forEach(function(frame) {
          const src = (frame.getAttribute("src") || "").toLowerCase();
          if (!src) {
            return;
          }
          if (
            src.includes("azgame.io") ||
            src.includes("cdnwave.com") ||
            src.includes("gmadsv1") ||
            src.includes("googlesyndication") ||
            src.includes("doubleclick")
          ) {
            hideOverlayNode(frame);
            if (frame.parentElement && isLargeOverlayElement(frame.parentElement)) {
              hideOverlayNode(frame.parentElement);
            }
          }
        });
      }

      function removeLockOverlay() {
        removeInjectedIframes();
        const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_ELEMENT);
        let node;
        while ((node = walker.nextNode())) {
          const text = (node.textContent || "").trim();
          if (!text) {
            continue;
          }
          if (looksLikeLockCopy(text)) {
            debugLockNode(node, text);
            hideLockTextNode(node);

            let current = node;
            let depth = 0;
            while (current && depth < 6) {
              if (current instanceof HTMLElement) {
                debugLockNode(current, text);
                if (depth === 0 || isLargeOverlayElement(current)) {
                  hideOverlayNode(current);
                }
                hideLockTextNode(current);
              }
              current = current.parentElement;
              depth += 1;
            }
          }
        }
      }

      function observeLockOverlay() {
        removeLockOverlay();
        const observer = new MutationObserver(function() {
          removeLockOverlay();
        });
        observer.observe(document.body, {
          childList: true,
          subtree: true,
          characterData: true
        });
        window.setInterval(removeLockOverlay, 200);
      }

      function isProtectedElement(node) {
        return node === document.documentElement ||
          node === document.body ||
          node === container ||
          node === canvas ||
          node === loadingBar ||
          node === errorPanel ||
          node === document.getElementById("unity-warning") ||
          container.contains(node);
      }

      function disablePointerBlockingOverlays() {
        container.style.pointerEvents = "auto";
        canvas.style.pointerEvents = "auto";
        canvas.style.position = "relative";
        canvas.style.zIndex = "2";

        const allNodes = document.body.querySelectorAll("*");
        allNodes.forEach(function(node) {
          if (!(node instanceof HTMLElement)) {
            return;
          }
          if (isProtectedElement(node)) {
            return;
          }
          const style = window.getComputedStyle(node);
          const rect = node.getBoundingClientRect();
          const isOverlayLike =
            (style.position === "fixed" || style.position === "absolute" || style.position === "sticky") &&
            rect.width >= window.innerWidth * 0.15 &&
            rect.height >= window.innerHeight * 0.08;

          if (isOverlayLike || looksLikeLockCopy(node.textContent || "")) {
            node.classList.add("codex-disable-pointer");
            if (style.zIndex !== "auto") {
              node.style.zIndex = "1";
            }
          }
        });
      }

      function forwardPointerToCanvas(sourceEvent) {
        if (!window.unityInstance) {
          return;
        }
        if (sourceEvent.target === canvas) {
          return;
        }
        const rect = canvas.getBoundingClientRect();
        const insideCanvas = sourceEvent.clientX >= rect.left &&
          sourceEvent.clientX <= rect.right &&
          sourceEvent.clientY >= rect.top &&
          sourceEvent.clientY <= rect.bottom;

        if (!insideCanvas) {
          return;
        }

        disablePointerBlockingOverlays();

        try {
          const forwarded = new MouseEvent(sourceEvent.type, {
            bubbles: true,
            cancelable: true,
            clientX: sourceEvent.clientX,
            clientY: sourceEvent.clientY,
            screenX: sourceEvent.screenX,
            screenY: sourceEvent.screenY,
            button: sourceEvent.button,
            buttons: sourceEvent.buttons,
            ctrlKey: sourceEvent.ctrlKey,
            shiftKey: sourceEvent.shiftKey,
            altKey: sourceEvent.altKey,
            metaKey: sourceEvent.metaKey
          });
          canvas.dispatchEvent(forwarded);
        } catch (error) {}
      }

      function installCanvasPriorityMode() {
        const forwardedTypes = ["pointerdown", "mousedown", "mouseup", "click", "touchstart"];
        forwardedTypes.forEach(function(eventType) {
          document.addEventListener(eventType, function(event) {
            forwardPointerToCanvas(event);
          }, true);
        });

        window.setInterval(disablePointerBlockingOverlays, 300);
      }

      function requestFullscreen(event) {
        if (document.fullscreenElement) {
          return;
        }
        if (event && event.type === "pointerdown" && event.button !== 0) {
          return;
        }
        if (container.requestFullscreen) {
          container.requestFullscreen().catch(function() {});
        }
      }

      function unlockAudio() {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) {
          return;
        }
        try {
          const context = window.__escapeRaidAudioContext || new AudioContextClass();
          window.__escapeRaidAudioContext = context;
          if (context.state === "suspended") {

      }

      function installInteractionHandlers() {
        const activate = function(event) {
          unlockAudio();
          requestFullscreen(event);
        };
        window.addEventListener("pointerdown", activate, { passive: true });
        window.addEventListener("keydown", activate, { passive: true });
        window.addEventListener("touchstart", activate, { passive: true });

      function tryUnityMessage(objectName, methodName, value) {
        const instance = window.unityInstance;
        if (!instance || typeof instance.SendMessage !== "function") {
          return false;
        }
        try {
          if (typeof value === "undefined") {
            instance.SendMessage(objectName, methodName);
          } else {
            instance.SendMessage(objectName, methodName, value);
          }
          return true;
        } catch (error) {
          return false;
        }

      function scheduleUnityStateNudge() {
        const calls = [
          ["GameUIControl", "SetReady"],
          ["GameUIControl", "ShowStartGame"],
          ["GameUIControl", "ShowOnGame"],
          ["GameUIControl", "HideAll"],
          ["FixStartGame", "Start1"],
          ["FixStartGame", "DelayedStart"],
          ["UI Cam", "SetReady"],
          ["UI Cam", "ShowStartGame"],
          ["MainGUI", "SetReady"],
          ["MainGUI", "ShowStartGame"]
        ];

        const delays = [200, 600, 1200, 2200, 4000];
        delays.forEach(function(delay) {
          setTimeout(function() {
            calls.forEach(function(entry) {
              tryUnityMessage(entry[0], entry[1]);
            });
          }, delay);
        });
      }

      async function bootGame() {
        loadingText.textContent = "Checking local files...";
        const missing = await verifyLocalFiles();
        if (missing.length) {
          setFatalError("Missing required local file" + (missing.length > 1 ? "s" : "") + ": " + missing.join(", "));
          return;
        }

        const dataMode = await configureDataUrl();
        loadingText.textContent = dataMode === "local"
          ? "Loading local Unity data..."
          : "Loading Unity data from the original host...";

        const script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = function() {
          createUnityInstance(canvas, config, function(progress) {
            const percent = Math.max(0, Math.min(100, Math.round(progress * 100)));
            progressBarFull.style.width = percent + "%";
            loadingText.textContent = percent >= 100
              ? "Starting game..."
              : "Loading... " + percent + "%";
          }).then(function(unityInstance) {
            window.unityInstance = unityInstance;
            loadingBar.style.display = "none";
            canvas.focus();
            installInteractionHandlers();
            installCanvasPriorityMode();
            disablePointerBlockingOverlays();
            document.dispatchEvent(new CustomEvent("gmsoftSdkReady"));
            scheduleUnityStateNudge();
          }).catch(function(message) {
            setFatalError(typeof message === "string" ? message : "Unity failed to start. Check the browser console for details.");
          });
        };
        script.onerror = function() {
          setFatalError("The Unity loader script could not be loaded.");
        };
        document.body.appendChild(script);
      }

      if (location.protocol === "file:") {
        setFatalError("This build must be served from a local web server. Opening index.html directly with file:// will not work for Unity WebGL.");
      } else {
        observeLockOverlay();
        bootGame();
      }
    })();
  </script>
</body>
</html>
